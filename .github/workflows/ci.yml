name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Compile i18n catalogs
        run: npm run i18n:compile

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run lint:tsc

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Build Storybook
        run: npm run build-storybook
