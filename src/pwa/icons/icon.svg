<!--
  The brand mark, as the app bar draws it: a white ₮ on a #3460d6 tile.

  The glyph is drawn as rectangles rather than as text, because the rasteriser
  has no access to Vazirmatn and would silently substitute a system font — or
  draw nothing at all — for a <text> element.

  This is the `purpose: any` icon: the corners are rounded here because nothing
  downstream will round them.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Daramadname">
  <rect width="512" height="512" rx="112" fill="#3460d6" />
  <g fill="#ffffff">
    <rect x="124" y="112" width="264" height="44" rx="8" />
    <rect x="234" y="112" width="44" height="288" rx="8" />
    <rect x="156" y="222" width="200" height="38" rx="8" />
    <rect x="156" y="294" width="200" height="38" rx="8" />
  </g>
</svg>
